name: deploy

# Deploy to Fly.io automatically once CI passes on main. The deploy job
# runs only when (a) the `ci` workflow for the same commit succeeded AND
# (b) the repo opt-in variable DEPLOY_ENABLED is set to "true".
#
# Pre-launch the variable is unset, so this workflow no-ops on every
# push — keeping the Actions tab clean while Fly isn't provisioned yet.
# To flip it on:
#   1) fly apps create soteria  (and fly volumes create ..., per docs/runbooks/go-live.md)
#   2) fly tokens create deploy  → paste as repo secret FLY_API_TOKEN
#      (Settings → Secrets and variables → Actions → Secrets tab)
#   3) Set repo variable DEPLOY_ENABLED=true
#      (Settings → Secrets and variables → Actions → Variables tab)
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    # Never let two deploys overlap; let an in-flight one finish.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
